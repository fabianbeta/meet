<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>When can we meet?</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #ffffff;
  --bg2:       #f0ede8;
  --bg3:       #e8e4de;
  --page:      #f5f3ef;
  --line:      #dedad4;
  --line2:     #c4c0b8;
  --text:      #1a1916;
  --muted:     #7a7870;
  --accent:    #185FA5;
  --accent-bg: #deeefa;
  --yes:       #1D9E75;
  --yes-bg:    #e1f5ee;
  --no:        #b93328;
  --no-bg:     #fce8e6;
  --maybe:     #9a5c00;
  --maybe-bg:  #fff3c0;
  --own-bg:    #eef5fd;
  --own-line:  #b5d4f4;
  --host-bg:   #fffaed;
  --host-line: #edc940;
  --r:         12px;
  --name-w:    105px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--page);
  color: var(--text);
  min-height: 100vh;
  padding: 20px 14px 56px;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

#header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
#event-title {
  flex: 1; font-size: 22px; font-weight: 700; line-height: 1.2;
  min-width: 0; word-break: break-word; letter-spacing: -0.3px;
}
#event-title[contenteditable="true"] {
  outline: none; border-bottom: 2px dashed var(--line2); padding-bottom: 1px; cursor: text;
}
#event-title[contenteditable="true"]:focus { border-color: var(--accent); }

.btn-sm {
  flex-shrink: 0; background: var(--bg); border: 1px solid var(--line2);
  border-radius: 8px; padding: 6px 11px; font-size: 12px; color: var(--muted);
  cursor: pointer; white-space: nowrap; line-height: 1.4;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.btn-sm.active { background: var(--host-bg); border-color: var(--host-line); color: #7a5000; font-weight: 600; }
#btn-host { font-size: 10px; padding: 3px 8px; border-radius: 6px; }

#legend {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
}
.leg {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg); border: 1px solid var(--line);
  border-radius: 20px; padding: 5px 12px;
  font-size: 14px; font-weight: 500; color: var(--text);
}
.leg-icon {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}

#host-panel {
  background: var(--host-bg); border: 1px solid var(--host-line);
  border-radius: var(--r); padding: 14px; margin-bottom: 14px; display: none;
}
#host-panel.visible { display: block; }
.host-section-title {
  font-size: 11px; font-weight: 700; color: #7a5000;
  letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px;
}

#cal-nav {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
}
#cal-month-label { font-size: 14px; font-weight: 600; }
.cal-nav-btn {
  background: var(--bg); border: 1px solid var(--line2); border-radius: 6px;
  width: 30px; height: 30px; font-size: 16px; cursor: pointer; color: var(--text);
  display: flex; align-items: center; justify-content: center;
}
.cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
#cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 12px;
}
.cal-dow {
  text-align: center; font-size: 10px; font-weight: 700;
  color: var(--muted); padding: 4px 0; letter-spacing: 0.04em;
}
.cal-day {
  aspect-ratio: 1; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; cursor: pointer; border: none;
  background: transparent; color: var(--text); position: relative;
}
.cal-day:hover:not(:disabled):not(.empty) { background: var(--bg3); }
.cal-day.today { font-weight: 700; }
.cal-day.today::after {
  content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: var(--accent);
}
.cal-day.sel { background: var(--accent); color: #fff; font-weight: 700; }
.cal-day.sel.today::after { background: rgba(255,255,255,0.6); }
.cal-day.empty { pointer-events: none; }
.cal-day:disabled { opacity: 0.25; cursor: not-allowed; }

#cal-actions { display: flex; flex-direction: column; gap: 7px; }
#btn-accept-dates {
  padding: 8px 14px; border: 1px solid var(--yes);
  background: var(--yes-bg); color: var(--yes); border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer; width: 100%;
}
#btn-accept-dates:hover { background: var(--yes); color: #fff; }
#btn-reset-dates {
  padding: 7px 14px; border: 1px solid #c87800;
  background: var(--maybe-bg); color: var(--maybe); border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer; width: 100%;
}
#btn-reset-dates:hover { background: var(--maybe); color: #fff; }
#btn-reset {
  padding: 7px 14px; border: 1px solid var(--no);
  background: var(--no-bg); color: var(--no); border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer; width: 100%;
}
#btn-reset:hover { background: var(--no); color: #fff; }

#grid-wrap {
  background: var(--bg); border: 1.5px solid var(--line2);
  border-radius: var(--r); overflow: hidden; margin-bottom: 10px;
}
#empty-msg {
  padding: 28px 16px; text-align: center;
  font-size: 13px; color: var(--muted); line-height: 1.7; display: none;
}

table { width: 100%; border-collapse: collapse; table-layout: fixed; }
colgroup col.col-name { width: var(--name-w); }
table.no-dates colgroup col.col-name { width: 100%; }

.th-name {
  background: var(--bg2); text-align: left; padding: 8px 10px;
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.07em;
  border-bottom: 1.5px solid var(--line2);
}
.th-date {
  background: var(--bg); text-align: center; padding: 6px 2px 5px;
  border-left: 1px solid var(--line); border-bottom: 1.5px solid var(--line2);
}
.th-day { display: block; font-size: 9px; font-weight: 600; color: var(--muted); }
.th-num { display: block; font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.1; }
.th-mon { display: block; font-size: 9px; font-weight: 600; color: var(--muted); margin-top: 1px; }

/* Column flash */
@keyframes col-flash-anim {
  0%, 50% { box-shadow: inset 0 0 0 999px rgba(24,95,165,0.09); }
  100%    { box-shadow: inset 0 0 0 999px rgba(24,95,165,0); }
}
.col-flash { animation: col-flash-anim 2.5s ease-out forwards; }

.tr-sum td {
  background: var(--bg2); border-bottom: 1px solid var(--line); padding: 4px 2px; text-align: center;
}
.tr-sum .td-blank { border-right: 1px solid var(--line); }
.td-cnt { border-left: 1px solid var(--line); }
.cnt-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 20px; height: 20px; border-radius: 10px;
  font-size: 11px; font-weight: 700;
  background: var(--bg3); color: var(--muted);
}
.cnt-badge.best { background: var(--yes-bg); color: var(--yes); }

.tr-p td { border-bottom: 1px solid var(--line); }
.tr-p:last-of-type td { border-bottom: none; }

.td-name {
  padding: 0 4px 0 8px; height: 39px;
  font-size: 13px; color: var(--text); vertical-align: middle;
}
.td-name-inner {
  display: flex; align-items: center; gap: 4px; min-width: 0; height: 100%;
}
.name-text {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1;
}
.you-dot {
  flex-shrink: 0; width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
}

/* Tappable name cells */
.tr-own .td-name          { cursor: pointer; }
.host-mode .tr-p .td-name { cursor: pointer; }

.tr-own td                { background: var(--own-bg); }
.tr-own .td-name          { font-weight: 600; }
.tr-own .td-cell          { border-left-color: var(--own-line); }

/* Revealed state: two equal action buttons, name hidden */
.td-name--revealed {
  padding: 0 6px;
}
.td-name--revealed .td-name-inner {
  gap: 5px;
}
.btn-name-action {
  flex: 1;                        /* equal width — guaranteed */
  height: 27px;
  border-radius: 6px; border: 1.5px solid;
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; line-height: 1;
}
.btn-name-edit   { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
.btn-name-edit:hover   { background: var(--accent);  color: #fff; }
.btn-name-remove { background: var(--no-bg);    color: var(--no);    border-color: var(--no); }
.btn-name-remove:hover { background: var(--no);      color: #fff; }

/* Full-width rename input (no buttons alongside) */
.rename-input {
  flex: 1; width: 100%; min-width: 0;
  padding: 4px 8px;
  border: none; border-bottom: 2px solid var(--accent);
  border-radius: 0; font-size: 13px; font-weight: 600;
  background: transparent; color: var(--text); outline: none;
}

.td-cell {
  text-align: center; vertical-align: middle; height: 39px; padding: 0 2px;
  border-left: 1px solid var(--line);
  user-select: none; -webkit-tap-highlight-color: transparent;
}
.tr-own .td-cell { cursor: pointer; }
.tr-own .td-cell:active { opacity: 0.6; }

.cell-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 27px; height: 27px; border-radius: 50%;
  font-size: 13px; font-weight: 700; line-height: 1;
}
.cell-icon.yes   { background: var(--yes-bg);   color: var(--yes); }
.cell-icon.no    { background: var(--no-bg);     color: var(--no);    font-size: 10px; }
.cell-icon.maybe { background: var(--maybe-bg);  color: var(--maybe); font-size: 16px; letter-spacing: -2px; }
.cell-icon.unset { background: var(--bg3);       color: var(--line2); font-size: 14px; }

#join-wrap {
  background: var(--bg); border: 1.5px solid var(--line2);
  border-radius: var(--r); padding: 10px 12px;
  display: flex; gap: 8px; align-items: center;
  transition: opacity 0.2s;
}
#join-wrap.has-user { opacity: 0.45; }

#join-input {
  flex: 1; min-width: 0; padding: 8px 11px;
  border: 1px solid var(--line2); border-radius: 8px;
  font-size: 14px; background: var(--bg); color: var(--text); outline: none;
}
#join-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(24,95,165,0.1); }
#join-btn {
  flex-shrink: 0; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; padding: 8px 14px;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
#join-btn:hover { background: #0c447c; }
#join-btn:disabled { opacity: 0.32; cursor: not-allowed; }

.hints {
  text-align: center; font-size: 11px; color: var(--muted);
  line-height: 1.9; padding: 10px 0 4px;
}
</style>
</head>
<body>

<div id="header">
  <div id="event-title" contenteditable="false" spellcheck="false">When can we meet?</div>
  <button class="btn-sm" id="btn-host">🔑 Host</button>
</div>

<div id="legend">
  <div class="leg">
    <div class="leg-icon" style="background:var(--yes-bg);color:var(--yes);">✓</div> Yes
  </div>
  <div class="leg">
    <div class="leg-icon" style="background:var(--no-bg);color:var(--no);">✕</div> No
  </div>
</div>

<div id="host-panel">
  <div class="host-section-title">Pick dates (up to 6)</div>
  <div id="cal-nav">
    <button class="cal-nav-btn" id="cal-prev">‹</button>
    <span id="cal-month-label"></span>
    <button class="cal-nav-btn" id="cal-next">›</button>
  </div>
  <div id="cal-grid"></div>
  <div id="cal-actions">
    <button id="btn-accept-dates">✓ Accept dates</button>
    <button id="btn-reset-dates">Reset dates</button>
    <button id="btn-reset">Reset board (clear all participants &amp; dates)</button>
  </div>
</div>

<div id="grid-wrap">
  <div id="empty-msg">Add your name below to get started.</div>
  <table id="grid-table" style="display:none">
    <colgroup id="colgroup"><col class="col-name"></colgroup>
    <thead id="grid-head"></thead>
    <tbody id="grid-body"></tbody>
  </table>
</div>

<div id="join-wrap">
  <input id="join-input" type="text" placeholder="Your name — or type to reclaim" autocomplete="off" maxlength="30">
  <button id="join-btn" disabled>Add →</button>
</div>

<div class="hints">
  <p>Tap on your name to edit or leave</p>
  <p>Come back on the same device to edit your response</p>
</div>

<script>
const DAY    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON    = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const CYCLE  = ['yes', 'no'];
const ICON   = { yes:'✓', no:'✕', maybe:'≈', unset:'–' };
const ID_KEY = 'avail_myid_v5';
const MAX_DATES = 6;

let S        = { title: 'When can we meet?', dates: [], participants: [] };
let myId     = localStorage.getItem(ID_KEY) || null;
let hostMode = false;
let pendingDates  = [];
let revealedPid   = null;   // which name cell is in "tapped / buttons visible" state

const titleEl   = document.getElementById('event-title');
const btnHost   = document.getElementById('btn-host');
const hostPanel = document.getElementById('host-panel');
const calGrid   = document.getElementById('cal-grid');
const calLabel  = document.getElementById('cal-month-label');
const emptyMsg  = document.getElementById('empty-msg');
const gridTable = document.getElementById('grid-table');
const colgroup  = document.getElementById('colgroup');
const gridHead  = document.getElementById('grid-head');
const gridBody  = document.getElementById('grid-body');
const joinWrap  = document.getElementById('join-wrap');
const joinInput = document.getElementById('join-input');
const joinBtn   = document.getElementById('join-btn');

const now = new Date();
let calYear  = now.getFullYear();
let calMonth = now.getMonth();

// Dismiss revealed state when clicking outside the grid
document.addEventListener('mousedown', e => {
  if (revealedPid !== null && gridBody && !gridBody.contains(e.target)) {
    revealedPid = null;
    render();
  }
});

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  if (!r.ok) console.error(method, path, await r.text());
  return r.json();
}

async function loadBoard() {
  const data = await fetch('/api/board').then(r => r.json());
  S = data;
  if (myId && !S.participants.find(p => p.id === myId)) myId = null;
  titleEl.textContent = S.title;
  render();
}

// ── Join UI ───────────────────────────────────────────────────────────────────
function updateJoinUI() {
  const onBoard = !!(myId && S.participants.find(p => p.id === myId));
  joinWrap.classList.toggle('has-user', onBoard);
  joinInput.placeholder = onBoard ? 'Add another person' : 'Your name — or type to reclaim';
}

joinInput.addEventListener('input', () => { joinBtn.disabled = !joinInput.value.trim(); });
joinInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !joinBtn.disabled) joinBtn.click(); });

joinBtn.addEventListener('click', async () => {
  const name = joinInput.value.trim(); if (!name) return;
  joinInput.value = ''; joinBtn.disabled = true;

  if (!myId) {
    const existing = S.participants.find(p => p.name.toLowerCase() === name.toLowerCase());
    if (existing) { myId = existing.id; localStorage.setItem(ID_KEY, myId); render(); return; }
  }

  const tempId    = 'tmp_' + Date.now();
  const freshJoin = !myId;
  if (freshJoin) myId = tempId;
  S.participants.push({ id: tempId, name, avail: {} });
  render();

  const res = await api('POST', '/board/join', { name });
  const idx = S.participants.findIndex(p => p.id === tempId);
  if (idx >= 0) S.participants[idx].id = res.id;
  if (freshJoin) { myId = res.id; localStorage.setItem(ID_KEY, myId); }
  render();
});

// ── Host panel ────────────────────────────────────────────────────────────────
btnHost.addEventListener('click', async () => {
  if (hostMode) { await commitAndClose(); }
  else {
    hostMode = true;
    pendingDates = [...S.dates];
    btnHost.classList.add('active');
    hostPanel.classList.add('visible');
    titleEl.contentEditable = 'true';
    renderCalendar();
    render();
  }
});

async function commitAndClose() {
  hostMode = false;
  btnHost.classList.remove('active');
  hostPanel.classList.remove('visible');
  titleEl.contentEditable = 'false';
  const before = JSON.stringify([...S.dates].sort());
  const after  = JSON.stringify([...pendingDates].sort());
  if (before !== after) { S.dates = [...pendingDates]; }
  render();
  if (before !== after) { api('PATCH', '/board/dates', { dates: S.dates }); }
}

document.getElementById('btn-accept-dates').addEventListener('click', commitAndClose);
document.getElementById('btn-reset-dates').addEventListener('click', () => { pendingDates = []; renderCalendar(); });

titleEl.addEventListener('input', () => {
  const t = titleEl.textContent.trim();
  S.title = t;
  clearTimeout(titleEl._t);
  titleEl._t = setTimeout(() => api('PATCH', '/board/title', { title: t || 'When can we meet?' }), 600);
});
titleEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); } });

document.getElementById('cal-prev').addEventListener('click', () => {
  calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar();
});
document.getElementById('cal-next').addEventListener('click', () => {
  calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if (!confirm('Reset board? This clears all participants and dates.')) return;
  myId = null; localStorage.removeItem(ID_KEY);
  revealedPid = null; pendingDates = []; S.participants = []; S.dates = [];
  render(); renderCalendar();
  api('POST', '/board/reset');
});

// ── Calendar ──────────────────────────────────────────────────────────────────
function renderCalendar() {
  calLabel.textContent = MONTHS[calMonth] + ' ' + calYear;
  const todayStr    = toDateStr(now);
  const firstDow    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = DAY.map(d => `<span class="cal-dow">${d.slice(0,2)}</span>`).join('');
  for (let i = 0; i < firstDow; i++) html += '<button class="cal-day empty" disabled></button>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds  = toDateStr(new Date(calYear, calMonth, d));
    const sel = pendingDates.includes(ds);
    const max = pendingDates.length >= MAX_DATES && !sel;
    html += `<button class="cal-day${sel?' sel':''}${ds===todayStr?' today':''}" data-date="${ds}"${max?' disabled':''}>${d}</button>`;
  }
  calGrid.innerHTML = html;

  calGrid.querySelectorAll('.cal-day[data-date]').forEach(btn => {
    btn.addEventListener('click', () => {
      const ds = btn.dataset.date;
      pendingDates = pendingDates.includes(ds)
        ? pendingDates.filter(x => x !== ds)
        : pendingDates.length < MAX_DATES ? [...pendingDates, ds].sort() : pendingDates;
      renderCalendar();
    });
  });
}

// ── Column flash ──────────────────────────────────────────────────────────────
function flashColumn(date) {
  gridTable.querySelectorAll(`[data-date="${date}"]`).forEach(el => {
    el.classList.remove('col-flash');
    void el.offsetWidth;
    el.classList.add('col-flash');
  });
}

// ── Edit mode: full-width input, no buttons ───────────────────────────────────
function enterEditMode(pid) {
  revealedPid = null; // clear tapped state first
  const me = S.participants.find(p => p.id === pid);
  if (!me) return;
  const row = gridBody.querySelector(`tr[data-pid="${pid}"]`);
  if (!row) return;
  const td        = row.querySelector('.td-name');
  const nameInner = td && td.querySelector('.td-name-inner');
  if (!nameInner || nameInner.querySelector('.rename-input')) return;

  const inp = el('input', 'rename-input');
  inp.value       = me.name;
  inp.placeholder = 'Name';

  nameInner.innerHTML = '';
  nameInner.appendChild(inp);
  requestAnimationFrame(() => { inp.focus(); inp.select(); });

  const commit = () => {
    const name = inp.value.trim();
    if (name && name !== me.name) {
      me.name = name;
      render();
      api('PATCH', '/board/rename', { id: pid, name });
    } else {
      render();
    }
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = me.name; inp.blur(); }
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const { dates, participants: people } = S;

  // Guard: clear revealedPid if that participant no longer exists
  if (revealedPid && !people.find(p => p.id === revealedPid)) revealedPid = null;

  const hasAny = people.length > 0 || dates.length > 0;
  emptyMsg.style.display  = hasAny ? 'none' : 'block';
  gridTable.style.display = hasAny ? '' : 'none';
  updateJoinUI();
  if (!hasAny) return;

  gridTable.classList.toggle('no-dates', dates.length === 0);
  colgroup.innerHTML = '<col class="col-name">';
  dates.forEach(() => colgroup.appendChild(el('col')));

  let h = '<tr><th class="th-name"></th>';
  dates.forEach(d => {
    const dt = new Date(d + 'T12:00:00');
    h += `<th class="th-date" data-date="${x(d)}">
      <span class="th-day">${DAY[dt.getDay()]}</span>
      <span class="th-num">${dt.getDate()}</span>
      <span class="th-mon">${MON[dt.getMonth()]}</span>
    </th>`;
  });
  h += '</tr>';
  gridHead.innerHTML = h;

  let sum = '';
  if (dates.length > 0) {
    const yc   = dates.map(d => people.filter(p => p.avail[d] === 'yes').length);
    const best = Math.max(...yc, 0);
    sum = '<tr class="tr-sum"><td class="td-blank"></td>';
    dates.forEach((d, i) => {
      sum += `<td class="td-cnt"><span class="cnt-badge${yc[i]===best&&yc[i]>0?' best':''}">${yc[i]}</span></td>`;
    });
    sum += '</tr>';
  }

  let rows = '';
  people.forEach(p => {
    const isMe      = p.id === myId;
    const isRevealed = p.id === revealedPid;

    rows += `<tr class="tr-p${isMe?' tr-own':''}" data-pid="${x(p.id)}">`;

    if (isRevealed) {
      // Tapped state: show two equal action buttons, name hidden
      rows += `<td class="td-name td-name--revealed"><div class="td-name-inner">
        <button class="btn-name-action btn-name-edit"   data-action="edit"   data-pid="${x(p.id)}">✎</button>
        <button class="btn-name-action btn-name-remove" data-action="remove" data-pid="${x(p.id)}">×</button>
      </div></td>`;
    } else {
      // Normal state: dot + name
      rows += `<td class="td-name"><div class="td-name-inner">
        ${isMe ? '<span class="you-dot"></span>' : ''}
        <span class="name-text">${x(p.name)}</span>
      </div></td>`;
    }

    dates.forEach(d => {
      const raw = p.avail[d];
      const s = (raw && CYCLE.includes(raw)) ? raw : (raw === 'maybe' ? 'maybe' : 'unset');
      rows += `<td class="td-cell" data-pid="${x(p.id)}" data-date="${x(d)}"><span class="cell-icon ${s}">${ICON[s]}</span></td>`;
    });
    rows += '</tr>';
  });

  gridBody.innerHTML = sum + rows;
  document.getElementById('grid-wrap').classList.toggle('host-mode', hostMode);
  gridBody.onclick = handleClick;
}

// ── Click handler ─────────────────────────────────────────────────────────────
function handleClick(e) {
  // ── Edit button (from revealed state) ──
  const editBtn = e.target.closest('[data-action="edit"]');
  if (editBtn) { enterEditMode(editBtn.dataset.pid); return; }

  // ── Remove button (from revealed state) ──
  const removeBtn = e.target.closest('[data-action="remove"]');
  if (removeBtn) {
    const pid  = removeBtn.dataset.pid;
    const me   = S.participants.find(p => p.id === pid);
    const isOwn = pid === myId;
    const msg  = isOwn
      ? 'Leave this board? Your availability will be removed.'
      : `Remove ${me ? me.name : 'this person'} from the board?`;
    if (!confirm(msg)) { revealedPid = null; render(); return; }
    if (isOwn) { myId = null; localStorage.removeItem(ID_KEY); }
    revealedPid = null;
    S.participants = S.participants.filter(p => p.id !== pid);
    render();
    api('DELETE', '/board/participant/' + pid);
    return;
  }

  // ── Name cell tap → toggle revealed state ──
  const nameCell = e.target.closest('.td-name');
  if (nameCell && !e.target.closest('[data-action]')) {
    const tr  = nameCell.closest('tr');
    const pid = tr && tr.dataset.pid;
    if (pid && (pid === myId || hostMode)) {
      // If clicking same revealed row, dismiss; otherwise switch to new
      revealedPid = (revealedPid === pid) ? null : pid;
      render();
      return;
    }
    // Clicking a non-editable name → dismiss any open revealed state
    if (revealedPid !== null) { revealedPid = null; render(); }
    return;
  }

  // ── Availability cell tap → clear revealed + cycle status ──
  if (revealedPid !== null) { revealedPid = null; render(); }

  const cell = e.target.closest('.td-cell');
  if (!cell || cell.dataset.pid !== myId) return;
  const me = S.participants.find(p => p.id === myId); if (!me) return;
  const d   = cell.dataset.date;
  const cur = me.avail[d];
  const next = (!cur || cur === 'unset' || !CYCLE.includes(cur))
    ? 'yes'
    : CYCLE[(CYCLE.indexOf(cur) + 1) % CYCLE.length];
  me.avail[d] = next;
  render();
  flashColumn(d);
  api('POST', '/board/respond', { id: myId, date: d, status: next });
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
function x(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadBoard().then(() => { if (!myId) joinInput.focus(); });
</script>
